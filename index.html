<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>마스토돈 아카이브 툿수 계산기</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 10px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .field { margin-bottom: 15px; }
        input, button { padding: 10px; width: 100%; box-sizing: border-box; margin-top: 5px; }
        button { background: #5a67d8; color: white; border: none; font-weight: bold; cursor: pointer; }
        #result-area { margin-top: 20px; display: none; }
        .count-display { font-size: 1.5rem; font-weight: bold; color: #5a67d8; text-align: center; margin-bottom: 20px; }
        .toot-list { max-height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 10px; background: #f9f9f9; font-size: 0.85rem; }
        .toot-item { border-bottom: 1px solid #ddd; padding: 10px 0; }
        .toot-item:last-child { border-bottom: none; }
        .tag { display: inline-block; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-right: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>툿수 계산기</h2>
    
    <div class="field">
        <label>최소 글자 수 (n자):</label>
        <input type="number" id="minLength" value="30">
    </div>

    <div class="field">
        <label>제외할 사용자 URL (선택):</label>
        <input type="text" id="excludeUrl" placeholder="https://planet.moe/@">
    </div>

    <div class="field">
        <input type="file" id="fileInput" accept=".json">
    </div>

    <button onclick="analyzeToots()">분석 및 목록 보기</button>

    <div id="result-area">
        <div class="count-display">분석 결과: <span id="finalCount">0</span>개</div>
        <p><strong>카운트된 툿 목록 (검증용):</strong></p>
        <div id="tootList" class="toot-list"></div>
    </div>
</div>

<script>
    function analyzeToots() {
        const fileInput = document.getElementById('fileInput');
        const minLength = parseInt(document.getElementById('minLength').value) || 0;
        const excludeUrl = document.getElementById('excludeUrl').value.trim();
        
        if (!fileInput.files[0]) return alert("파일을 선택하세요!");

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = JSON.parse(e.target.result);
            const tootListDiv = document.getElementById('tootList');
            tootListDiv.innerHTML = '';
            
            let count = 0;
            const seenContents = new Set(); // 본문 내용 중복 체크
            const seenIds = new Set();      // ID 중복 체크

            data.orderedItems.forEach(item => {
                // 오직 Create 활동만
                if (item.type === 'Create' && item.object && typeof item.object === 'object') {
                    const obj = item.object;
                    const content = obj.content || "";
                    
                    // 1. ID 중복 제거
                    if (seenIds.has(obj.id)) return;
                    seenIds.add(obj.id);

                    // 2. 특정 사용자 제외
                    const tags = obj.tag || [];
                    const hasExcluded = tags.some(t => t.href === excludeUrl) || content.includes(excludeUrl);
                    if (excludeUrl && hasExcluded) return;

                    // 3. 순수 텍스트 추출 (글자수용)
                    let textForCount = content.replace(/<span class="h-card">.*?<\/span>/g, '');
                    textForCount = textForCount.replace(/<[^>]+?>/g, '');
                    textForCount = textForCount.replace(/&[a-z0-9]+;/gi, ' ');
                    textForCount = textForCount.replace(/https?:\/\/[^\s]+/g, '');
                    textForCount = textForCount.replace(/@[a-zA-Z0-9_@.]+/g, '').trim();

                    // 4. 본문 내용 중복 제거 (수정된 글이 Create로 또 들어온 경우 대비)
                    // 공백까지 다 지운 텍스트를 기준으로 중복을 체크합니다.
                    const strictText = textForCount.replace(/\s+/g, '');
                    if (strictText.length === 0 || seenContents.has(strictText)) return;
                    
                    // 5. 글자수 필터링
                    if (textForCount.length >= minLength) {
                        seenContents.add(strictText);
                        count++;

                        // 목록에 추가
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'toot-item';
                        itemDiv.innerHTML = `<div>${textForCount.substring(0, 100)}${textForCount.length > 100 ? '...' : ''}</div>
                                             <div style="color: #999; font-size: 0.7rem;">(글자수: ${textForCount.length})</div>`;
                        tootListDiv.appendChild(itemDiv);
                    }
                }
            });

            document.getElementById('result-area').style.display = 'block';
            document.getElementById('finalCount').innerText = count;
        };
        reader.readAsText(fileInput.files[0]);
    }
</script>
</body>
</html>
