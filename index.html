<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마스토돈 툿수 계산기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f9; color: #333; line-height: 1.6; max-width: 700px; margin: 50px auto; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #2d3748; text-align: center; }
        .field { margin-bottom: 25px; padding-bottom: 10px; border-bottom: 1px solid #edf2f7; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.95rem; }
        input[type="text"], input[type="number"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; }
        
        /* 다중 입력 스타일 */
        .exclude-item { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn-add { background-color: #48bb78; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; margin-bottom: 10px; }
        .btn-remove { background-color: #f56565; color: white; border: none; padding: 0 12px; border-radius: 6px; cursor: pointer; }
        
        .checkbox-group { display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: bold; }
        .checkbox-group input { width: 18px; height: 18px; }
        
        button#calc-btn { width: 100%; padding: 15px; background-color: #5a67d8; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button#calc-btn:hover { background-color: #4c51bf; }
        
        #result { margin-top: 30px; padding: 20px; border-radius: 12px; background-color: #edf2f7; text-align: center; display: none; border: 2px solid #5a67d8; }
        .count-num { font-size: 2.5rem; color: #5a67d8; font-weight: 900; }
        .info-text { font-size: 0.85rem; color: #718096; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h1>마스토돈 아이디 미포함 글자수 툿수 계산기 </h1>

    <div class="field">
        <label for="minLength">최소 글자 수 설정 (n자 이상)</label>
        <input type="number" id="minLength" value="30" min="0">
    </div>

    <div class="field">
        <label class="checkbox-group">
            <input type="checkbox" id="useExcludeUser"> 특정 사용자(봇 등) 언급 시 제외
        </label>
        <div id="excludeList" style="margin-top:10px;">
            <div class="exclude-item">
                <input type="text" class="excludeUrl" placeholder="예: https://planet.moe/@">
            </div>
        </div>
        <button class="btn-add" onclick="addExcludeField()">+ 인원 추가</button>
        <p class="info-text">* 위 목록 중 한 명이라도 포함된 툿은 제외됩니다.</p>
    </div>

    <div class="field">
        <label class="checkbox-group">
            <input type="checkbox" id="excludeNormalToots"> 멘션 없는 '일반 툿'은 제외
        </label>
        <p class="info-text">* 체크 시, 누군가를 태그(@)한 툿만 계산합니다.</p>
    </div>

    <div class="field">
        <label for="fileInput">outbox.json 파일 선택</label>
        <input type="file" id="fileInput" accept=".json">
    </div>

    <button id="calc-btn" onclick="calculateToots()">툿수 계산하기</button>

    <div id="result">
        <div id="resultText" style="font-weight: bold;">분석된 툿 개수</div>
        <div class="count-num" id="finalCount">0</div>
    </div>
</div>

<script>
    // 입력 칸 추가 함수
    function addExcludeField() {
        const container = document.getElementById('excludeList');
        const div = document.createElement('div');
        div.className = 'exclude-item';
        div.innerHTML = `
            <input type="text" class="excludeUrl" placeholder="https://주소...">
            <button class="btn-remove" onclick="this.parentElement.remove()">✕</button>
        `;
        container.appendChild(div);
    }

 function calculateToots() {
    const fileInput = document.getElementById('fileInput');
    const minLength = parseInt(document.getElementById('minLength').value) || 0;
    const useExcludeUser = document.getElementById('useExcludeUser').checked;
    const excludeNormalToots = document.getElementById('excludeNormalToots').checked;
    
    const excludeUrls = Array.from(document.querySelectorAll('.excludeUrl'))
                            .map(input => input.value.trim())
                            .filter(val => val !== "");

    const resultDiv = document.getElementById('result');
    const finalCountSpan = document.getElementById('finalCount');

    if (!fileInput.files[0]) {
        alert("파일을 선택해 주세요!");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            let count = 0;
            // 중복 체크를 위한 Set (고유 ID 저장)
            const processedIds = new Set();

            if (!data.orderedItems) return;

            // 아카이브는 보통 최신순으로 정렬되어 있습니다.
            data.orderedItems.forEach(item => {
                // Create(생성) 활동만 계산하고 Update(수정)는 무시합니다. 
                // (수정된 글도 결국 최초 Create 시점의 데이터가 아카이브에 존재함)
                if (item.type === 'Create' && item.object && typeof item.object === 'object') {
                    const obj = item.object;
                    
                    // 1. 고유 ID(URL) 추출 및 중복 검사
                    // 마스토돈 툿은 고유의 atomId나 id(URL)를 가집니다.
                    const tootId = obj.id;
                    if (processedIds.has(tootId)) return; 
                    processedIds.add(tootId);

                    // 2. 내용 확인
                    const content = obj.content || "";
                    const tags = obj.tag || [];
                    const mentions = tags.filter(t => t.type === 'Mention');
                    const isMention = mentions.length > 0;

                    // [조건] 일반 툿 제외
                    if (excludeNormalToots && !isMention) return;

                    // [조건] 특정 사용자 제외
                    if (useExcludeUser && excludeUrls.length > 0) {
                        const hasExcluded = mentions.some(m => excludeUrls.includes(m.href)) || 
                                          excludeUrls.some(url => content.includes(url));
                        if (hasExcluded) return;
                    }

                    // [글자수 계산] 태그 및 아이디 완전 제외
                    let tempText = content.replace(/<span class="h-card">.*?<\/span>/g, '');
                    tempText = tempText.replace(/<[^>]+?>/g, '');
                    tempText = tempText.replace(/&[a-z0-9]+;/gi, ' ');
                    tempText = tempText.replace(/https?:\/\/[^\s]+/g, '');
                    tempText = tempText.replace(/@[a-zA-Z0-9_@.]+/g, '');
                    
                    const cleanText = tempText.trim();

                    if (cleanText.length >= minLength) {
                        count++;
                    }
                }
            });

            resultDiv.style.display = 'block';
            finalCountSpan.innerText = count.toLocaleString() + " 개";

        } catch (err) {
            alert("파일 읽기 오류가 발생했습니다.");
        }
    };
    reader.readAsText(fileInput.files[0]);
}
</script>

</body>
</html>
