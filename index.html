<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>마스토돈 아카이브 툿 계산기</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 1.4rem; text-align: center; color: #333; }
        .setting-item { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; }
        input[type="text"], input[type="number"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; font-weight: bold; cursor: pointer; }
        .exclude-input-group { display: flex; gap: 5px; margin-bottom: 5px; }
        .btn { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #48bb78; color: white; padding: 5px 15px; margin-top: 5px; }
        .btn-calc { background: #5a67d8; color: white; width: 100%; padding: 15px; font-size: 1.1rem; margin-top: 10px; }
        .btn-calc:hover { background: #4c51bf; }
        #result-area { margin-top: 30px; display: none; border-top: 2px solid #5a67d8; padding-top: 20px; }
        .count-box { text-align: center; font-size: 2rem; color: #5a67d8; font-weight: 800; margin-bottom: 20px; }
        .toot-list { max-height: 500px; overflow-y: auto; background: #fafafa; border: 1px solid #eee; border-radius: 8px; }
        .toot-item { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .toot-meta { font-size: 0.75rem; color: #888; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🐘 마스토돈 툿 계산기</h1>

    <div class="setting-item">
        <label>최소 글자 수 (n자 이상)</label>
        <input type="number" id="minLength" value="1">
    </div>

    <div class="setting-item">
        <label class="checkbox-group"><input type="checkbox" id="useExcludeUser"> 특정 사용자 언급 시 제외</label>
        <div id="excludeList" style="margin-top:10px;">
            <div class="exclude-input-group">
                <input type="text" class="excludeUrl" placeholder="https://주소...">
            </div>
        </div>
        <button class="btn btn-add" onclick="addInput()">+ 인원 추가</button>
    </div>

    <div class="setting-item">
        <label class="checkbox-group"><input type="checkbox" id="excludeNormal"> 멘션 없는 일반 툿 제외</label>
        <label class="checkbox-group" style="margin-top:10px;"><input type="checkbox" id="excludeDM" checked> <strong>DM(개인 멘션/Direct) 제외</strong></label>
    </div>

    <div class="setting-item">
        <label>아카이브 파일 (outbox.json)</label>
        <input type="file" id="fileInput" accept=".json">
    </div>

    <button class="btn btn-calc" onclick="runAnalysis()">분석 시작</button>

    <div id="result-area">
        <div class="count-box">결과: <span id="finalCount">0</span>개</div>
        <div id="tootDisplay" class="toot-list"></div>
    </div>
</div>

<script>
    function addInput() {
        const div = document.createElement('div');
        div.className = 'exclude-input-group';
        div.innerHTML = `<input type="text" class="excludeUrl" placeholder="https://주소..."><button onclick="this.parentElement.remove()" style="background:#ff5c5c; color:white; border:none; border-radius:4px; cursor:pointer; padding:0 10px;">✕</button>`;
        document.getElementById('excludeList').appendChild(div);
    }

    function runAnalysis() {
        const fileInput = document.getElementById('fileInput');
        if (!fileInput.files[0]) return alert("파일을 선택해 주세요!");

        const minLength = parseInt(document.getElementById('minLength').value) || 0;
        const useExcludeUser = document.getElementById('useExcludeUser').checked;
        const excludeNormal = document.getElementById('excludeNormal').checked;
        const excludeDM = document.getElementById('excludeDM').checked;
        const excludeUrls = Array.from(document.querySelectorAll('.excludeUrl')).map(i => i.value.trim()).filter(v => v !== "");

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                const display = document.getElementById('tootDisplay');
                display.innerHTML = '';
                
                let count = 0;
                const processedIds = new Set();
                const processedContents = new Set();

                if (!data.orderedItems) throw new Error("outbox.json 형식이 올바르지 않습니다.");

                data.orderedItems.forEach(item => {
                    // Create 타입의 Note 객체만 확인
                    if (item.type === 'Create' && item.object && typeof item.object === 'object') {
                        const obj = item.object;

                        // 1. 중복 ID 방지
                        if (processedIds.has(obj.id)) return;
                        processedIds.add(obj.id);

                        // 2. [강화된 DM 제외 로직]
                        if (excludeDM) {
                            // (A) 명시적인 visibility가 direct인 경우
                            if (obj.visibility === 'direct') return;

                            // (B) 전송 대상(to, cc)에 followers나 Public 주소가 없는 경우 (개인 멘션)
                            const recipients = [...(item.to || []), ...(item.cc || [])].join(' ');
                            if (!recipients.includes('followers') && !recipients.includes('Public')) {
                                return;
                            }
                        }

                        const content = obj.content || "";
                        const tags = obj.tag || [];
                        const mentions = tags.filter(t => t.type === 'Mention');
                        const isMention = mentions.length > 0;

                        // 3. 일반 툿 필터
                        if (excludeNormal && !isMention) return;

                        // 4. 특정 사용자 제외 필터
                        if (useExcludeUser && excludeUrls.length > 0) {
                            const hasExcluded = mentions.some(m => excludeUrls.includes(m.href)) || 
                                              excludeUrls.some(url => content.includes(url));
                            if (hasExcluded) return;
                        }

                        // 5. 글자수 계산용 텍스트 정제
                        let cleanText = content.replace(/<span class="h-card">.*?<\/span>/g, '');
                        cleanText = cleanText.replace(/<[^>]+?>/g, '');
                        cleanText = cleanText.replace(/&[a-z0-9]+;/gi, ' ');
                        cleanText = cleanText.replace(/https?:\/\/[^\s]+/g, '');
                        cleanText = cleanText.replace(/@[a-zA-Z0-9_@.]+/g, '').trim();

                        // 6. 중복 내용 방지 및 최소 글자수 체크
                        const strictText = cleanText.replace(/\s+/g, '');
                        if (cleanText.length < minLength || processedContents.has(strictText)) return;
                        processedContents.add(strictText);

                        count++;

                        // 결과 목록 생성
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'toot-item';
                        itemDiv.innerHTML = `<div class="toot-meta">글자수: ${cleanText.length} | ID: ${obj.id.split('/').pop()}</div><div>${cleanText}</div>`;
                        display.appendChild(itemDiv);
                    }
                });

                document.getElementById('result-area').style.display = 'block';
                document.getElementById('finalCount').innerText = count;

            } catch (err) {
                alert("분석 중 오류 발생: " + err.message);
                console.error(err);
            }
        };
        reader.readAsText(fileInput.files[0]);
    }
</script>
</body>
</html>
